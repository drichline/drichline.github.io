<a href=/contact>Contact</a></div></nav><main><div class=content><section><h1>Eridian Clock</h1><style>p,h1,h2,h3{text-align:center}.big{font-size:6rem}</style><h1 class=big><div id=time></div></h1><h2><span id=date-display></span></h2><hr><h1 id=epoch-book-release>Epoch: Book release</h1><h1 class=big><div id=epoch></div></h1><h2><span id=date></span></h2><script>const eridTick=2.366,eridDay=6**5*eridTick,eridYear=198.8*eridDay,epoch=new Date(2021,5,4);function base6(e){const t=["ℓ","I","V","λ","+","∀"];if(e===0)return t[0];let n=[];for(;e>0;)n.push(t[e%6]),e=Math.floor(e/6);return n.reverse().join("")}function updateClock(){const e=Date.now(),n=(e-epoch)/1e3%eridDay,t=(e-epoch)/1e3/eridYear,s=base6(Math.round(n/eridTick)),o=base6(Math.round(Math.round((e-epoch.getTime())/1e3)/eridTick)),i="Year "+Math.round(t)+" day "+Math.round((t-Math.floor(t))*198.8);document.getElementById("time").textContent=s,document.getElementById("epoch").textContent=o,document.getElementById("date").textContent=i;const a=new Date,r=a.toUTCString(),c=document.getElementById("date-display");c.textContent=r}setInterval(updateClock,100),updateClock()</script><p>Last modified: 2026-04-04</p></section></div></main><footer><span>&copy;2018-2026 Dakota Richline </span><a rel=license href=http://creativecommons.org/licenses/by/4.0/><img alt="Creative Commons License" style=border-width:0 src=/images/80x15.png></a><br><span><i>Ad Astra Per Scientiam!</i></span></footer></body></html>
